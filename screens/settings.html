<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WorkCare — Cài đặt</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.24.0/dist/tabler-icons.min.css" />
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/screens/settings.css">
</head>
<body data-page="settings">
<div class="canvas">
<!-- FRAME 13: Cài đặt -->
<div>
<p class="lbl">Frame 13 — Cài đặt</p>
<div class="phone">
<div class="notch"></div>
<div class="screen f13">
  <div class="f13-head">
    <div style="display:flex;align-items:center;gap:10px">
      <i class="ti ti-arrow-left" style="font-size:20px;color:var(--text);cursor:pointer" aria-hidden="true" onclick="window.location.href='home.html'"></i>
      <p class="f13-title">Cài đặt</p>
    </div>
  </div>
  <div class="f13-body">
    <div class="set-section">
      <div class="set-head">Bộ hẹn giờ</div>
      <div class="set-row">
        <div class="set-label"><i class="ti ti-clock" aria-hidden="true"></i><span>Thời gian làm việc</span></div>
        <span class="set-val">60 phút <i class="ti ti-chevron-right" style="font-size:14px;vertical-align:-2px" aria-hidden="true"></i></span>
      </div>
      <div class="set-row">
        <div class="set-label"><i class="ti ti-coffee" aria-hidden="true"></i><span>Thời gian nghỉ ngơi</span></div>
        <span class="set-val">10 phút <i class="ti ti-chevron-right" style="font-size:14px;vertical-align:-2px" aria-hidden="true"></i></span>
      </div>
      <div class="set-row">
        <div class="set-label"><i class="ti ti-droplet" aria-hidden="true"></i><span>Nhắc nhở uống nước</span></div>
        <span class="set-val">30 phút <i class="ti ti-chevron-right" style="font-size:14px;vertical-align:-2px" aria-hidden="true"></i></span>
      </div>
    </div>
    <div class="set-section">
      <div class="set-head">Thông báo</div>
      <div class="set-row">
        <div class="set-label"><i class="ti ti-bell" aria-hidden="true"></i><span>Bật thông báo</span></div>
        <div class="toggle on"></div>
      </div>
      <div class="set-row">
        <div class="set-label"><i class="ti ti-volume" aria-hidden="true"></i><span>Âm thanh cảnh báo</span></div>
        <div class="toggle on"></div>
      </div>
      <div class="set-row">
        <div class="set-label"><i class="ti ti-device-mobile-vibration" aria-hidden="true"></i><span>Rung</span></div>
        <div class="toggle on"></div>
      </div>
    </div>
    <div class="set-section">
      <div class="set-head">Giao diện</div>
      <div class="set-row">
        <div class="set-label"><i class="ti ti-moon" aria-hidden="true"></i><span>Chế độ tối</span></div>
        <div id="darkModeToggle" class="toggle off"></div>
      </div>
      <div class="set-row">
        <div class="set-label"><i class="ti ti-language" aria-hidden="true"></i><span>Ngôn ngữ</span></div>
        <span class="set-val">Tiếng Việt <i class="ti ti-chevron-right" style="font-size:14px;vertical-align:-2px" aria-hidden="true"></i></span>
      </div>
    </div>
    <div class="set-section">
      <div class="set-head">Tài khoản</div>
      <div class="set-row">
        <div class="set-label"><i class="ti ti-shield-check" aria-hidden="true"></i><span>Chính sách riêng tư</span></div>
        <i class="ti ti-chevron-right" style="font-size:18px;color:var(--hint)" aria-hidden="true"></i>
      </div>
      <div class="set-row set-row-red" id="logoutBtn" style="cursor:pointer">
        <div class="set-label"><i class="ti ti-logout" aria-hidden="true"></i><span>Đăng xuất</span></div>
        <i class="ti ti-chevron-right" style="font-size:18px;color:#DC2626" aria-hidden="true"></i>
      </div>
    </div>
  </div>
</div>
</div>
</div>

</div>
</div>
  <script src="../js/app.js"></script>
</body>
</html>

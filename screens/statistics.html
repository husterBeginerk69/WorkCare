<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WorkCare — Thống kê</title>

    <link rel="stylesheet" href="../css/variables.css" />
    <link rel="stylesheet" href="../css/global.css" />
    <link rel="stylesheet" href="../css/layout.css" />
    <link rel="stylesheet" href="../css/components.css" />
    <link rel="stylesheet" href="../css/screens/statistics.css" />

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>

  <body data-page="statistics">
    <div class="canvas">
      <div>
        <p class="lbl">Frame 10 — Thống kê</p>

        <div class="phone">
          <div class="notch"></div>

          <div class="screen f10">

            <!-- HEADER -->
            <div class="f10-head">
              <p class="f10-title">Thống kê</p>

              <div class="period-row">
                <button class="period-btn">Ngày</button>
                <button class="period-btn active">Tuần</button>
                <button class="period-btn">Tháng</button>
              </div>
            </div>

            <!-- BODY -->
            <div class="f10-body">

              <!-- CHART CARD -->
              <div class="chart-card">
                <p class="chart-title">Thời gian làm việc (giờ)</p>

                <!-- ✅ CHỈ GIỮ 1 CANVAS -->
                <div class="chart-wrapper">
                  <canvas id="workChart"></canvas>
                </div>
              </div>

              <!-- BAR CHART (không động vào Chart.js nữa) -->
              <div class="chart-card">
                <p class="chart-title">Số lần nghỉ ngơi</p>

                <div class="bar-chart">
                  <div class="bar-wrap">
                    <div class="bar" style="height: 50px; background: #4ade80"></div>
                    <span class="bar-lbl">T2</span>
                  </div>

                  <div class="bar-wrap">
                    <div class="bar" style="height: 60px; background: #4ade80"></div>
                    <span class="bar-lbl">T3</span>
                  </div>

                  <div class="bar-wrap">
                    <div class="bar" style="height: 40px; background: #4ade80"></div>
                    <span class="bar-lbl">T4</span>
                  </div>

                  <div class="bar-wrap">
                    <div class="bar" style="height: 55px; background: #bbf7d0"></div>
                    <span class="bar-lbl">T5</span>
                  </div>

                  <div class="bar-wrap">
                    <div class="bar" style="height: 65px; background: #bbf7d0"></div>
                    <span class="bar-lbl">T6</span>
                  </div>

                  <div class="bar-wrap">
                    <div class="bar" style="height: 25px; background: #bbf7d0"></div>
                    <span class="bar-lbl">T7</span>
                  </div>

                  <div class="bar-wrap">
                    <div class="bar" style="height: 15px; background: #bbf7d0"></div>
                    <span class="bar-lbl">CN</span>
                  </div>
                </div>
              </div>

              <!-- STATS -->
              <div class="streak-row">
                <div class="streak-card">
                  <p class="streak-val" style="color: var(--blue)">14</p>
                  <p class="streak-lbl">Ngày duy trì liên tục</p>
                </div>

                <div class="streak-card">
                  <p class="streak-val" style="color: var(--green)">3h 20'</p>
                  <p class="streak-lbl">Tổng nghỉ trong tuần</p>
                </div>
              </div>

              

            </div>

            

            <!-- NAV -->
            <div class="nav-bar">
              <div class="nav-item">
                <span>Trang chủ</span>
              </div>
              <div class="nav-item active">
                <span>Thống kê</span>
              </div>
              <div class="nav-item">
                <span>Thành tích</span>
              </div>
              <div class="nav-item">
                <span>Cá nhân</span>
              </div>
            </div>

          </div>
        </div>

      </div>
    </div>

    <script type="module" src="../js/app.js"></script>
  </body>
</html>

<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WorkCare — Đăng ký</title>
    <link rel="stylesheet" href="../css/variables.css" />
    <link rel="stylesheet" href="../css/global.css" />
    <link rel="stylesheet" href="../css/layout.css" />
    <link rel="stylesheet" href="../css/components.css" />
    <link rel="stylesheet" href="../css/screens/register.css" />
  </head>
  <body data-page="register">
    <div class="canvas">
      <!-- FRAME 4: Đăng ký -->
      <div>
        <p class="lbl">Frame 4 — Đăng ký</p>
        <div class="phone">
          <div class="notch"></div>
          <div class="screen f3" style="">
            <div
              class="f3-head"
              style="padding-top: 52px; padding-bottom: 20px"
            >
              <p class="f3-title">Tạo tài khoản mới</p>
              <p class="f3-sub">
                Bắt đầu hành trình chăm sóc sức khỏe cùng WorkCare
              </p>
            </div>
            <div class="f3-body" id="authForm">
              <div class="inp-wrap">
                <label class="inp-lbl" for="authName">Họ và tên</label>
                <div class="inp-row">
                  <i class="ti ti-user" aria-hidden="true"></i
                  ><input
                    id="authName"
                    type="text"
                    class="inp"
                    placeholder="Nguyễn Văn An"
                  />
                </div>
                <span class="error-text" id="authNameError"></span>
              </div>
              <div class="inp-wrap">
                <label class="inp-lbl" for="authEmail">Địa chỉ email</label>
                <div class="inp-row">
                  <i class="ti ti-mail" aria-hidden="true"></i
                  ><input
                    id="authEmail"
                    type="email"
                    class="inp"
                    placeholder="name@example.com"
                  />
                </div>
                <span class="error-text" id="authEmailError"></span>
              </div>
              <div class="inp-wrap">
                <label class="inp-lbl" for="authPassword">Mật khẩu</label>
                <div class="inp-row">
                  <i class="ti ti-lock" aria-hidden="true"></i
                  ><input
                    id="authPassword"
                    type="password"
                    class="inp"
                    placeholder="Ít nhất 8 ký tự"
                  /><i
                    class="ti ti-eye toggle-password"
                    data-target="authPassword"
                    aria-hidden="true"
                  ></i>
                </div>
                <span class="error-text" id="authPasswordError"></span>
              </div>
              <div class="inp-wrap">
                <label class="inp-lbl" for="authConfirm"
                  >Xác nhận mật khẩu</label
                >
                <div class="inp-row">
                  <i class="ti ti-lock-check" aria-hidden="true"></i
                  ><input
                    id="authConfirm"
                    type="password"
                    class="inp"
                    placeholder="Nhập lại mật khẩu"
                  /><i
                    class="ti ti-eye toggle-password"
                    data-target="authConfirm"
                    aria-hidden="true"
                  ></i>
                </div>
                <span class="error-text" id="authConfirmError"></span>
              </div>
              <div
                style="
                  background: #f0fdf4;
                  border-radius: 10px;
                  padding: 10px 12px;
                  display: flex;
                  align-items: flex-start;
                  gap: 8px;
                "
              >
                <div
                  style="
                    width: 16px;
                    height: 16px;
                    border-radius: 4px;
                    background: #16a34a;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    margin-top: 1px;
                    flex-shrink: 0;
                  "
                >
                  <i
                    class="ti ti-check"
                    style="font-size: 12px; color: #fff"
                    aria-hidden="true"
                  ></i>
                </div>
                <span style="font-size: 12px; color: #15803d; line-height: 1.5"
                  >Tôi đồng ý với
                  <span style="font-weight: 600; text-decoration: underline"
                    >Điều khoản sử dụng</span
                  >
                  và
                  <span style="font-weight: 600; text-decoration: underline"
                    >Chính sách quyền riêng tư</span
                  ></span
                >
              </div>
              <button class="btn-primary" id="authSubmit">Đăng ký ngay</button>
              <p style="text-align: center; font-size: 13px; color: var(--sub)">
                Đã có tài khoản?
                <span class="link-txt" id="goLoginLink">Đăng nhập</span>
              </p>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="../js/app.js"></script>
  </body>
</html>

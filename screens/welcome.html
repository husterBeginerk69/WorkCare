<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WorkCare — Chào mừng</title>
    <link rel="stylesheet" href="../css/variables.css" />
    <link rel="stylesheet" href="../css/global.css" />
    <link rel="stylesheet" href="../css/layout.css" />
    <link rel="stylesheet" href="../css/components.css" />
    <link rel="stylesheet" href="../css/screens/welcome.css" />
  </head>
  <body data-page="welcome">
    <div class="canvas">
      <!-- FRAME 1: Chào mừng -->
      <div>
        <p class="lbl">Frame 1 — Chào mừng</p>
        <div class="phone">
          <div class="notch"></div>
          <div class="screen f1">
            <div class="f1-top">
              <div class="f1-logo">
                <div class="f1-logo-icon">
                  <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
                    <path
                      d="M14 4C14 4 8 8 8 14C8 18.4 11.6 22 14 22C16.4 22 20 18.4 20 14C20 8 14 4 14 4Z"
                      fill="white"
                      opacity=".9"
                    />
                    <path
                      d="M14 10C14 10 10 13 10 16C10 18.2 12 20 14 20C16 20 18 18.2 18 16C18 13 14 10 14 10Z"
                      fill="white"
                    />
                    <circle cx="14" cy="16" r="2.5" fill="#2563EB" />
                  </svg>
                </div>
                <span class="f1-logo-txt">WorkCare</span>
              </div>
              <div class="f1-illus">
                <svg
                  viewBox="0 0 220 180"
                  fill="none"
                  xmlns="http://www.w3.org/2000/svg"
                >
                  <!-- desk -->
                  <rect
                    x="20"
                    y="130"
                    width="180"
                    height="10"
                    rx="3"
                    fill="#BFDBFE"
                  />
                  <rect
                    x="30"
                    y="140"
                    width="12"
                    height="30"
                    rx="3"
                    fill="#93C5FD"
                  />
                  <rect
                    x="178"
                    y="140"
                    width="12"
                    height="30"
                    rx="3"
                    fill="#93C5FD"
                  />
                  <!-- monitor -->
                  <rect
                    x="60"
                    y="60"
                    width="100"
                    height="72"
                    rx="8"
                    fill="#1E40AF"
                  />
                  <rect
                    x="64"
                    y="64"
                    width="92"
                    height="62"
                    rx="5"
                    fill="#EFF6FF"
                  />
                  <!-- screen content -->
                  <rect
                    x="72"
                    y="72"
                    width="50"
                    height="6"
                    rx="2"
                    fill="#BFDBFE"
                  />
                  <rect
                    x="72"
                    y="82"
                    width="35"
                    height="5"
                    rx="2"
                    fill="#BBF7D0"
                  />
                  <rect
                    x="72"
                    y="91"
                    width="42"
                    height="5"
                    rx="2"
                    fill="#BFDBFE"
                  />
                  <rect
                    x="128"
                    y="72"
                    width="20"
                    height="20"
                    rx="4"
                    fill="#2563EB"
                    opacity=".2"
                  />
                  <!-- stand -->
                  <rect
                    x="102"
                    y="132"
                    width="16"
                    height="10"
                    rx="2"
                    fill="#93C5FD"
                  />
                  <rect
                    x="90"
                    y="140"
                    width="40"
                    height="5"
                    rx="2"
                    fill="#60A5FA"
                  />
                  <!-- person -->
                  <circle cx="155" cy="85" r="14" fill="#FED7AA" />
                  <ellipse cx="155" cy="105" rx="15" ry="18" fill="#2563EB" />
                  <rect
                    x="147"
                    y="118"
                    width="10"
                    height="15"
                    rx="4"
                    fill="#1E40AF"
                  />
                  <rect
                    x="159"
                    y="118"
                    width="10"
                    height="15"
                    rx="4"
                    fill="#1E40AF"
                  />
                  <!-- arms -->
                  <path
                    d="M142 108 C135 112 78 118 76 115"
                    stroke="#FED7AA"
                    stroke-width="6"
                    stroke-linecap="round"
                  />
                  <path
                    d="M168 108 C172 112 176 116 180 115"
                    stroke="#FED7AA"
                    stroke-width="6"
                    stroke-linecap="round"
                  />
                  <!-- sparkles -->
                  <circle cx="40" cy="50" r="4" fill="#BBF7D0" opacity=".8" />
                  <circle cx="185" cy="40" r="3" fill="#BFDBFE" opacity=".8" />
                  <circle cx="200" cy="70" r="5" fill="#BBF7D0" opacity=".6" />
                  <circle cx="25" cy="80" r="3" fill="#BFDBFE" opacity=".7" />
                </svg>
              </div>
              <p class="f1-tagline">
                Làm việc hiệu quả<br />Nghỉ ngơi thông minh
              </p>
              <p class="f1-sub" style="margin-top: 8px">
                Nhắc nhở nghỉ ngơi thông minh cho cuộc sống lành mạnh hơn
              </p>
            </div>
            <div class="f1-bottom">
              <button class="btn-primary" id="startBtn">Bắt đầu</button>
              <p
                style="
                  text-align: center;
                  font-size: 13px;
                  color: var(--hint);
                  margin-top: 14px;
                "
              >
                Đã có tài khoản?
                <span
                  id="welcomeLoginLink"
                  style="color: var(--blue); font-weight: 500; cursor: pointer"
                  >Đăng nhập</span
                >
              </p>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="../js/app.js"></script>
  </body>
</html>

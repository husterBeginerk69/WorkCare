<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WorkCare — Danh sách bài tập</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.24.0/dist/tabler-icons.min.css"
    />
    <link rel="stylesheet" href="../css/variables.css" />
    <link rel="stylesheet" href="../css/global.css" />
    <link rel="stylesheet" href="../css/layout.css" />
    <link rel="stylesheet" href="../css/components.css" />
    <link rel="stylesheet" href="../css/screens/exercises.css" />
  </head>
  <body data-page="exercises">
    <div class="canvas">
      <!-- FRAME 7: Danh sách bài tập -->
      <div>
        <p class="lbl">Frame 7 — Danh sách bài tập</p>
        <div class="phone">
          <div class="notch"></div>
          <div class="screen f7">
            <div class="f7-head">
              <div class="f7-head-search" style="position: relative">
                <div
                  onclick="location.href = 'home.html'"
                  style="
                    position: absolute;
                    top: 0;
                    left: 0;
                    width: 36px;
                    height: 36px;
                    background: rgba(0, 0, 0, 0.05);
                    border-radius: 10px;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    cursor: pointer;
                    z-index: 5;
                  "
                >
                  <i
                    class="ti ti-arrow-left"
                    style="font-size: 18px; color: #0f172a"
                  ></i>
                </div>
                <p class="f7-title" style="margin-left: 44px">
                  Bài tập nghỉ ngơi
                </p>
                <div class="search-group">
                  <i class="ti ti-search" aria-hidden="true"></i
                  ><input
                    id="exerciseSearch"
                    class="inp"
                    type="search"
                    placeholder="Tìm bài tập"
                  />
                </div>
              </div>
              <div class="cat-scroll">
                <div class="cat-pill active" data-category="all">Tất cả</div>
                <div class="cat-pill" data-category="neck">Cổ</div>
                <div class="cat-pill" data-category="shoulders">Vai</div>
                <div class="cat-pill" data-category="back">Lưng</div>
                <div class="cat-pill" data-category="eyes">Mắt</div>
              </div>
            </div>
            <div class="ex-list">
              <div class="ex-card" data-category="neck">
                <div class="ex-thumb" style="background: #eff6ff">
                  <svg width="40" height="40" viewBox="0 0 40 40">
                    <circle cx="20" cy="12" r="7" fill="#93C5FD" />
                    <path
                      d="M20 19 C20 19 10 22 10 28"
                      stroke="#2563EB"
                      stroke-width="3"
                      stroke-linecap="round"
                    />
                    <path
                      d="M20 19 C20 19 30 22 30 28"
                      stroke="#2563EB"
                      stroke-width="3"
                      stroke-linecap="round"
                    />
                    <path
                      d="M12 16 C8 18 8 22 12 22"
                      stroke="#FED7AA"
                      stroke-width="3"
                      stroke-linecap="round"
                      fill="none"
                    />
                    <path
                      d="M28 16 C32 18 32 22 28 22"
                      stroke="#FED7AA"
                      stroke-width="3"
                      stroke-linecap="round"
                      fill="none"
                    />
                  </svg>
                </div>
                <div class="ex-info">
                  <p class="ex-name">Giãn cơ cổ</p>
                  <p class="ex-dur">
                    <i
                      class="ti ti-clock"
                      style="font-size: 12px"
                      aria-hidden="true"
                    ></i
                    >3 phút • Dễ
                  </p>
                </div>
                <i class="ti ti-chevron-right ex-arrow" aria-hidden="true"></i>
              </div>
              <div class="ex-card" data-category="shoulders">
                <div class="ex-thumb" style="background: #f0fdf4">
                  <svg width="40" height="40" viewBox="0 0 40 40">
                    <circle cx="20" cy="10" r="6" fill="#86EFAC" />
                    <path
                      d="M20 16 L20 28"
                      stroke="#16A34A"
                      stroke-width="3"
                      stroke-linecap="round"
                    />
                    <path
                      d="M20 18 C20 18 8 16 6 20"
                      stroke="#16A34A"
                      stroke-width="3"
                      stroke-linecap="round"
                      fill="none"
                    />
                    <path
                      d="M20 18 C20 18 32 16 34 20"
                      stroke="#16A34A"
                      stroke-width="3"
                      stroke-linecap="round"
                      fill="none"
                    />
                  </svg>
                </div>
                <div class="ex-info">
                  <p class="ex-name">Giãn cơ vai</p>
                  <p class="ex-dur">
                    <i
                      class="ti ti-clock"
                      style="font-size: 12px"
                      aria-hidden="true"
                    ></i
                    >5 phút • Trung bình
                  </p>
                </div>
                <i class="ti ti-chevron-right ex-arrow" aria-hidden="true"></i>
              </div>
              <div class="ex-card" data-category="back">
                <div class="ex-thumb" style="background: #ecfeff">
                  <svg width="40" height="40" viewBox="0 0 40 40">
                    <circle cx="20" cy="10" r="6" fill="#67E8F9" />
                    <path
                      d="M20 16 L20 26"
                      stroke="#0891B2"
                      stroke-width="3"
                      stroke-linecap="round"
                    />
                    <path
                      d="M14 26 C14 26 12 30 14 33 L20 33 L26 33 C28 30 26 26 26 26 Z"
                      stroke="#0891B2"
                      stroke-width="2.5"
                      fill="#CFFAFE"
                    />
                    <path
                      d="M10 20 L8 24"
                      stroke="#0891B2"
                      stroke-width="3"
                      stroke-linecap="round"
                    />
                    <path
                      d="M30 20 L32 24"
                      stroke="#0891B2"
                      stroke-width="3"
                      stroke-linecap="round"
                    />
                  </svg>
                </div>
                <div class="ex-info">
                  <p class="ex-name">Giãn cơ lưng</p>
                  <p class="ex-dur">
                    <i
                      class="ti ti-clock"
                      style="font-size: 12px"
                      aria-hidden="true"
                    ></i
                    >7 phút • Trung bình
                  </p>
                </div>
                <i class="ti ti-chevron-right ex-arrow" aria-hidden="true"></i>
              </div>
              <div class="ex-card" data-category="eyes">
                <div class="ex-thumb" style="background: #fff7ed">
                  <svg width="40" height="40" viewBox="0 0 40 40">
                    <ellipse
                      cx="20"
                      cy="20"
                      rx="14"
                      ry="10"
                      fill="#FED7AA"
                      stroke="#F97316"
                      stroke-width="2"
                    />
                    <ellipse cx="20" cy="20" rx="6" ry="6" fill="#1E40AF" />
                    <ellipse cx="20" cy="20" rx="3" ry="3" fill="#93C5FD" />
                    <circle cx="20" cy="20" r="1.5" fill="#fff" />
                  </svg>
                </div>
                <div class="ex-info">
                  <p class="ex-name">Thư giãn mắt</p>
                  <p class="ex-dur">
                    <i
                      class="ti ti-clock"
                      style="font-size: 12px"
                      aria-hidden="true"
                    ></i
                    >5 phút • Dễ
                  </p>
                </div>
                <i class="ti ti-chevron-right ex-arrow" aria-hidden="true"></i>
              </div>
              <div class="ex-card" data-category="fullbody">
                <div class="ex-thumb" style="background: #f5f3ff">
                  <svg width="40" height="40" viewBox="0 0 40 40">
                    <circle cx="20" cy="10" r="6" fill="#C4B5FD" />
                    <path
                      d="M20 16 L20 26"
                      stroke="#7C3AED"
                      stroke-width="3"
                      stroke-linecap="round"
                    />
                    <path
                      d="M20 18 C20 18 10 14 8 18"
                      stroke="#7C3AED"
                      stroke-width="2.5"
                      stroke-linecap="round"
                      fill="none"
                    />
                    <path
                      d="M20 18 C20 18 30 14 32 18"
                      stroke="#7C3AED"
                      stroke-width="2.5"
                      stroke-linecap="round"
                      fill="none"
                    />
                    <path
                      d="M15 26 L10 34"
                      stroke="#7C3AED"
                      stroke-width="3"
                      stroke-linecap="round"
                    />
                    <path
                      d="M25 26 L30 34"
                      stroke="#7C3AED"
                      stroke-width="3"
                      stroke-linecap="round"
                    />
                  </svg>
                </div>
                <div class="ex-info">
                  <p class="ex-name">Vận động toàn thân</p>
                  <p class="ex-dur">
                    <i
                      class="ti ti-clock"
                      style="font-size: 12px"
                      aria-hidden="true"
                    ></i
                    >10 phút • Cao
                  </p>
                </div>
                <i class="ti ti-chevron-right ex-arrow" aria-hidden="true"></i>
              </div>
            </div>
            <div class="nav-bar">
              <div class="nav-item active">
                <i class="ti ti-home" aria-hidden="true"></i
                ><span>Trang chủ</span>
              </div>
              <div class="nav-item">
                <i class="ti ti-chart-bar" aria-hidden="true"></i
                ><span>Thống kê</span>
              </div>
              <div class="nav-item">
                <i class="ti ti-trophy" aria-hidden="true"></i
                ><span>Thành tích</span>
              </div>
              <div class="nav-item">
                <i class="ti ti-user" aria-hidden="true"></i
                ><span>Cá nhân</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="../js/app.js"></script>
  </body>
</html>

<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WorkCare — Theo dõi uống nước</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.24.0/dist/tabler-icons.min.css"
    />
    <link rel="stylesheet" href="../css/variables.css" />
    <link rel="stylesheet" href="../css/global.css" />
    <link rel="stylesheet" href="../css/layout.css" />
    <link rel="stylesheet" href="../css/components.css" />
    <link rel="stylesheet" href="../css/screens/water.css" />
  </head>
  <body data-page="water">
    <div class="canvas">
      <!-- FRAME 9: Uống nước -->
      <div>
        <p class="lbl">Frame 9 — Theo dõi uống nước</p>
        <div class="phone">
          <div class="notch"></div>
          <div class="screen f9">
            <div class="f9-head">
              <div
                style="
                  display: flex;
                  justify-content: space-between;
                  align-items: flex-start;
                "
              >
                <div style="display: flex; align-items: center; gap: 10px">
                  <div
                    class="back-btn"
                    style="
                      width: 32px;
                      height: 32px;
                      background: rgba(255, 255, 255, 0.2);
                      border-radius: 8px;
                      display: flex;
                      align-items: center;
                      justify-content: center;
                      cursor: pointer;
                    "
                    onclick="window.location.href = 'home.html'"
                  >
                    <i
                      class="ti ti-arrow-left"
                      style="color: #fff; font-size: 16px"
                    ></i>
                  </div>
                  <div>
                    <p class="f9-lbl">Theo dõi nước uống</p>
                    <p class="f9-title">Thứ Tư, 04/06</p>
                  </div>
                </div>
                <div
                  style="
                    background: rgba(255, 255, 255, 0.2);
                    border-radius: 12px;
                    padding: 8px 12px;
                    text-align: center;
                  "
                >
                  <p style="font-size: 18px; font-weight: 700; color: #fff">
                    7
                  </p>
                  <p style="font-size: 10px; color: rgba(255, 255, 255, 0.75)">
                    ngày streak
                  </p>
                </div>
              </div>
              <div style="text-align: center; margin-top: 16px">
                <div class="water-ring">
                  <p class="water-val" id="waterAmount">
                    1.625<span style="font-size: 14px">L</span>
                  </p>
                  <p class="water-goal">/ 2.5 L mục tiêu</p>
                </div>
              </div>
            </div>
            <div class="f9-body">
              <div class="progress-bar-wrap">
                <div class="pb-lbl-row">
                  <span class="pb-lbl">Tiến trình hôm nay</span
                  ><span class="pb-pct" id="waterPercent">65%</span>
                </div>
                <div class="pb-track">
                  <div class="pb-fill" id="waterFill"></div>
                </div>
                <p style="font-size: 12px; color: var(--sub); margin-top: 8px">
                  Còn <strong id="waterLeft">875 ml</strong> nữa để đạt mục tiêu
                </p>
              </div>
              <div class="glass-grid">
                <div class="glass-item filled">💧</div>
                <div class="glass-item filled">💧</div>
                <div class="glass-item filled">💧</div>
                <div class="glass-item filled">💧</div>
                <div class="glass-item filled">💧</div>
                <div class="glass-item filled">💧</div>
                <div class="glass-item empty">🫙</div>
                <div class="glass-item empty">🫙</div>
              </div>
              <p
                style="
                  font-size: 11px;
                  color: var(--sub);
                  text-align: center;
                  margin-bottom: 10px;
                "
              >
                Mỗi biểu tượng = 250 ml
              </p>
              <button class="add-btn" id="addWaterBtn">
                <i class="ti ti-plus" aria-hidden="true"></i>Thêm 250 ml
              </button>
              <button
                class="btn-outline"
                id="resetWaterBtn"
                style="margin-top: 8px"
              >
                🔄 Reset hôm nay
              </button>
              <div
                style="
                  background: #fff;
                  border-radius: 14px;
                  border: 1px solid var(--border);
                  padding: 12px;
                  margin-top: 12px;
                  display: flex;
                  align-items: center;
                  gap: 10px;
                "
              >
                <div
                  style="
                    width: 36px;
                    height: 36px;
                    background: #eff6ff;
                    border-radius: 10px;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                  "
                >
                  <i
                    class="ti ti-bell"
                    style="font-size: 18px; color: var(--blue)"
                    aria-hidden="true"
                  ></i>
                </div>
                <div style="flex: 1">
                  <p
                    style="
                      font-size: 13px;
                      font-weight: 600;
                      color: var(--text);
                    "
                  >
                    Nhắc nhở uống nước
                  </p>
                  <p style="font-size: 11px; color: var(--sub)">Mỗi 30 phút</p>
                </div>
                <div class="toggle on"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="../js/app.js"></script>
  </body>
</html>

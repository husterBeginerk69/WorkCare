<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WorkCare — Đăng nhập</title>
    <link rel="stylesheet" href="../css/variables.css" />
    <link rel="stylesheet" href="../css/global.css" />
    <link rel="stylesheet" href="../css/layout.css" />
    <link rel="stylesheet" href="../css/components.css" />
    <link rel="stylesheet" href="../css/screens/login.css" />
  </head>
  <body data-page="login">
    <div class="canvas">
      <!-- FRAME 3: Đăng nhập -->
      <div>
        <p class="lbl">Frame 3 — Đăng nhập</p>
        <div class="phone">
          <div class="notch"></div>
          <div class="screen f3">
            <div class="f3-head">
              <div
                style="
                  width: 44px;
                  height: 44px;
                  background: linear-gradient(135deg, #2563eb, #16a34a);
                  border-radius: 13px;
                  display: flex;
                  align-items: center;
                  justify-content: center;
                  margin-bottom: 16px;
                "
              >
                <svg width="24" height="24" viewBox="0 0 28 28" fill="none">
                  <path
                    d="M14 4C14 4 8 8 8 14C8 18.4 11.6 22 14 22C16.4 22 20 18.4 20 14C20 8 14 4 14 4Z"
                    fill="white"
                  />
                  <circle cx="14" cy="16" r="2.5" fill="#2563EB" />
                </svg>
              </div>
              <p class="f3-title">Chào mừng trở lại!</p>
              <p class="f3-sub">
                Đăng nhập để tiếp tục hành trình chăm sóc sức khỏe
              </p>
            </div>
            <div class="f3-body" id="authForm">
              <div class="inp-wrap">
                <label class="inp-lbl" for="authEmail">Địa chỉ email</label>
                <div class="inp-row">
                  <i class="ti ti-mail" aria-hidden="true"></i
                  ><input
                    id="authEmail"
                    type="email"
                    class="inp"
                    placeholder="name@example.com"
                  />
                </div>
                <span class="error-text" id="authEmailError"></span>
              </div>
              <div class="inp-wrap">
                <label class="inp-lbl" for="authPassword">Mật khẩu</label>
                <div class="inp-row">
                  <i class="ti ti-lock" aria-hidden="true"></i
                  ><input
                    id="authPassword"
                    type="password"
                    class="inp"
                    placeholder="••••••••"
                  /><i
                    class="ti ti-eye toggle-password"
                    data-target="authPassword"
                    aria-hidden="true"
                  ></i>
                </div>
                <span class="error-text" id="authPasswordError"></span>
              </div>
              <div style="text-align: right">
                <span class="link-txt" id="forgotPasswordLink"
                  >Quên mật khẩu?</span
                >
              </div>
              <button class="btn-primary" id="authSubmit">Đăng nhập</button>
              <div class="divider">
                <div class="divider-line"></div>
                <span class="divider-txt">hoặc</span>
                <div class="divider-line"></div>
              </div>
              <div
                style="
                  border: 1.5px solid var(--border);
                  border-radius: 14px;
                  height: 48px;
                  display: flex;
                  align-items: center;
                  justify-content: center;
                  gap: 10px;
                  cursor: pointer;
                "
              >
                <svg width="20" height="20" viewBox="0 0 20 20">
                  <circle cx="10" cy="10" r="10" fill="#EA4335" />
                  <text
                    x="6"
                    y="14"
                    font-size="11"
                    fill="white"
                    font-weight="700"
                  >
                    G
                  </text>
                </svg>
                <span
                  style="font-size: 14px; font-weight: 500; color: var(--text)"
                  >Đăng nhập với Google</span
                >
              </div>
              <p style="text-align: center; font-size: 13px; color: var(--sub)">
                Chưa có tài khoản?
                <span class="link-txt" id="goRegisterLink"
                  >Tạo tài khoản mới</span
                >
              </p>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="../js/app.js"></script>
  </body>
</html>
